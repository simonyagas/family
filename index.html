<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#090b16">
    <meta name="description" content="Una nueva partida familiar para descubrir. Presioná start y mirá la sorpresa.">
    <meta property="og:title" content="Nueva partida familiar">
    <meta property="og:description" content="Una nueva partida familiar para descubrir. Presioná start y mirá la sorpresa">
    <meta property="og:type" content="website">
    <meta property="og:image" content="https://simonyagas.github.io/family/assets/img/og-preview.png?v=3">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Nueva partida familiar">
    <meta name="twitter:description" content="Una nueva partida familiar para descubrir. Presioná start y mirá la sorpresa">
    <meta name="twitter:image" content="https://simonyagas.github.io/family/assets/img/og-preview.png?v=3">
    <title>Nueva partida familiar</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <div class="pixel-world" aria-hidden="true">
      <span class="star star--one"></span>
      <span class="star star--two"></span>
      <span class="star star--three"></span>
      <span class="map-tile map-tile--one"></span>
      <span class="map-tile map-tile--two"></span>
      <span class="map-tile map-tile--three"></span>
    </div>

    <main class="game-shell">
      <div class="screen-frame">
        <section class="scene" id="scene">
          <div class="scene__status" id="sceneStatus">NUEVA PARTIDA</div>

          <div class="scene__visual" id="sceneVisual" aria-label="Personajes y objetos de la partida"></div>

          <div class="dialogue-box" aria-live="polite" aria-atomic="true">
            <p class="dialogue-box__label" id="sceneLabel">SAVE FILE 2026</p>
            <h1 class="dialogue-box__title" id="sceneTitle">PRESS START</h1>
            <p class="dialogue-box__text" id="sceneText">Para una noticia</p>
            <p class="dialogue-box__release" id="sceneRelease" hidden></p>
          </div>

          <div class="scene__actions">
            <button class="start-button" id="continueButton" type="button">
              START
            </button>
            <button class="share-button is-hidden" id="shareButton" type="button" aria-label="Compartir anuncio de mellizos">
              COMPARTIR
            </button>
          </div>

          <button class="sound-button" id="soundButton" type="button" aria-pressed="true" aria-label="Desactivar sonido">
            <svg class="sound-button__icon" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M4 9v6h4l5 4V5L8 9H4z"></path>
              <path class="sound-button__wave" d="M16 8c1.5 1.2 1.5 6.8 0 8"></path>
              <path class="sound-button__wave" d="M19 5c3 3.4 3 10.6 0 14"></path>
            </svg>
          </button>
        </section>
      </div>
    </main>

    <script src="script.js"></script>
  </body>
</html>
