<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#090b16">
    <title>Familia Yagas - Save File 2026</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <div class="pixel-world" aria-hidden="true">
      <span class="star star--one"></span>
      <span class="star star--two"></span>
      <span class="star star--three"></span>
      <span class="map-tile map-tile--one"></span>
      <span class="map-tile map-tile--two"></span>
      <span class="map-tile map-tile--three"></span>
    </div>

    <main class="game-shell" aria-live="polite">
      <div class="screen-frame">
        <section class="scene" id="scene">
          <div class="scene__status" id="sceneStatus">SAVE FILE 2026</div>

          <div class="scene__visual" id="sceneVisual" aria-label="Party actual"></div>

          <div class="dialogue-box">
            <p class="dialogue-box__label" id="sceneLabel">FAMILIA YAGAS</p>
            <h1 class="dialogue-box__title" id="sceneTitle">SAVE FILE 2026</h1>
            <p class="dialogue-box__text" id="sceneText">PRESS START</p>
          </div>

          <button class="start-button" id="continueButton" type="button">
            PRESS START
          </button>
        </section>
      </div>
    </main>

    <script src="script.js"></script>
  </body>
</html>
