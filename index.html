<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#090b16">
    <meta name="description" content="Familia Yagas tiene una nueva partida para descubrir. Presiona start y mira la sorpresa.">
    <meta property="og:title" content="Familia Yagas - Nueva partida">
    <meta property="og:description" content="Hay una sorpresa esperando. Presiona start para descubrirla.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://simonyagas.github.io/family/">
    <meta property="og:image" content="https://simonyagas.github.io/family/assets/img/og-preview.png">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Familia Yagas - Nueva partida">
    <meta name="twitter:description" content="Hay una sorpresa esperando. Presiona start para descubrirla.">
    <meta name="twitter:image" content="https://simonyagas.github.io/family/assets/img/og-preview.png">
    <title>Familia Yagas - Partida 2026</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <div class="pixel-world" aria-hidden="true">
      <span class="star star--one"></span>
      <span class="star star--two"></span>
      <span class="star star--three"></span>
      <span class="map-tile map-tile--one"></span>
      <span class="map-tile map-tile--two"></span>
      <span class="map-tile map-tile--three"></span>
    </div>

    <main class="game-shell">
      <div class="screen-frame">
        <section class="scene" id="scene">
          <div class="scene__status" id="sceneStatus">NUEVA PARTIDA</div>

          <div class="scene__visual" id="sceneVisual" aria-label="Personajes y objetos de la partida"></div>

          <div class="dialogue-box" aria-live="polite" aria-atomic="true">
            <p class="dialogue-box__label" id="sceneLabel">FAMILIA YAGAS</p>
            <h1 class="dialogue-box__title" id="sceneTitle">PARTIDA 2026</h1>
            <p class="dialogue-box__text" id="sceneText">NUEVA PARTIDA DISPONIBLE</p>
            <p class="dialogue-box__release" id="sceneRelease" hidden></p>
          </div>

          <div class="scene__actions">
            <button class="start-button" id="continueButton" type="button">
              START
            </button>
            <button class="share-button is-hidden" id="shareButton" type="button" aria-label="Compartir anuncio de mellizos">
              COMPARTIR
            </button>
          </div>
        </section>
      </div>
    </main>

    <script src="script.js"></script>
  </body>
</html>
